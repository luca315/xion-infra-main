networks:
  backend:
    name: backend

volumes:
  nginx-proxy-manager-data:
    name: nginx-proxy-manager-data
  nginx-proxy-manager-letsencrypt:
    name: nginx-proxy-manager-letsencrypt
  dns-config:
    name: dns-config
  wp-data:
    name: wp-data
  minecraft-data:
    name: minecraft-data
  uptime-kuma-data:
    name: uptime-kuma-data
  portainer-data:
    name: portainer-data
  mariadb-data:
    name: mariadb-data
    
services:
  # --- REVERSE PROXY ---
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    hostname: nginx-proxy-manager
    container_name: nginx-proxy-manager
    environment:
      TZ: ${NGINX_PROXY_MANAGER_TZ}
    ports:
      - "80:80/tcp"
      - "81:81/tcp"
      - "443:443/tcp"
      - "25565:25565/tcp"
      - "53:53/tcp"
      - "53:53/udp"

    volumes:
      - nginx-proxy-manager-data:/data
      - nginx-proxy-manager-letsencrypt:/etc/letsencrypt
    networks:
      - backend

  # --- DNS ---
  dns-server:
    image: 'technitium/dns-server:14.3.0'
    hostname: dns-server
    container_name: dns-server
    volumes:
      - dns-config:/etc/dns
    ports:
      - '53:53/tcp'
      - '53:53/udp'
    networks:
      - backend
    depends_on:
      - mariadb
      - nginx-proxy-manager

  # --- MARIADB ---
  mariadb:
    image: mariadb:11.4
    hostname: mariadb
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - backend

  # --- PMA ---
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2.3-apache
    container_name: pma
    hostname: pma
    restart: unless-stopped
    depends_on:
      - mariadb
      - dns-server
      - nginx-proxy-manager
    environment:
      PMA_HOST: mariadb

  # --- diagrams ---
  diagrams:
    image: jgraph/drawio:29.6.4
    hostname: diagrams
    restart: unless-stopped
    container_name: diagrams
    networks:
      - backend

  # --- element ---
  element:
    image: vectorim/element-web:latest
    restart: unless-stopped
    container_name: element
    hostname: element
    networks:
      - backend

  # --- netdata ---
  netdata:
    image: netdata/netdata:2.9.0
    hostname: netdata
    container_name: netdata
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend

  # --- wordpress ---
  wordpress:
    image: wordpress:php8.4-apache
    hostname: wordpress
    container_name: wordpress
    restart: unless-stopped
    volumes:
      - wp-data:/var/www/html
    networks:
      - backend

  # --- mcserver ---
  mcserver:
    image: itzg/minecraft-server:java21
    container_name: mcserver
    hostname: mcserver
    environment:
      EULA: "TRUE"        # Akzeptiert die Endbenutzer-Lizenzbedingungen
      VERSION: "1.21.11"   # Wählt die aktuellste stabile Version
      TYPE: "PAPER"     # Server-Typ (z.B. PAPER, FORGE, FABRIC)
      MEMORY: "2G"        # Zugewiesener Arbeitsspeicher
      MOTD: "Willkommen auf dem offiziellen minecraft-server des xion projektes"
    volumes:
      - minecraft-data:/data # Speichert Welt & Configs lokal im Ordner 'minecraft-data'
    restart: unless-stopped
    networks:
      - backend
  
  # --- Uptima Kuma ---
  uptime-kuma:
    image: louislam/uptime-kuma:2.2.1
    container_name: uptime-kuma
    hostname: uptime-kuma
    volumes:
      - uptime-kuma-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - backend
      
  portainer:
    image: portainer/portainer-ee:l.25.0
    container_name: portainer
    hostname: portainer
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - backend

