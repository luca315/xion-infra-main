networks:
  default:
    name: xion-net

volumes:
  mc-proxy-data:
    name: mc-data
  portainer-data:
    name: portainer-data

services:
  # --- DIAGRAMS & DRAWING ---
  drawio:
    image: jgraph/drawio:29.6.6
    container_name: drawio
    restart: unless-stopped
    ports: 
      - 3001:8080

       # --- Cloud Console ---
  portainer:
    container_name: portainer
    hostname: portainer
    image: portainer/portainer-ee:lts
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    ports:
      - "3002:9000/tcp"
  
  # --- Minecraft Server ---
  minecraft:
    image: itzg/minecraft-server:${ENV_MC_IMAGE_VERSION}
    container_name: mc-server
    hostname: mc-server
    stdin_open: true
    ports:
      - "25565:25565/tcp"
    environment:
      EULA: "TRUE"
      TYPE: VELOCITY
      MEMORY:  512M
      VERSION: 1.21.11
    volumes:
      - mc-data:/data
    restart: unless-stopped


  

